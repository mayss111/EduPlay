spring.application.name=EduPlay
# Server
server.port=${PORT:8082}
server.address=0.0.0.0

# Database - PostgreSQL (Render) or MySQL (local)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:mysql://127.0.0.1:3307/eduplay_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true&connectTimeout=10000&socketTimeout=60000}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.hikari.schema=public
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Redis (optional - disabled by default for free tier)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=${SPRING_CACHE_TYPE:none}

# JWT
app.jwt.secret=${APP_JWT_SECRET:EduPlayLocalJwtSecretKey_ChangeMe_2026}
app.jwt.expiration=86400000

# Ollama API - DISABLED (using question bank only)
ollama.base-url=
ollama.model=qwen2.5:7b-instruct
ollama.temperature=0.25

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,https://*.vercel.app,https://*.onrender.app,https://*.onrender.com}

# Initialisation de la base de données
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false
spring.jpa.open-in-view=false
spring.sql.init.continue-on-error=true

# Désactivation Redis (Inutile et lent au démarrage)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Optimisation stable
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=60000
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true

# Logs
logging.level.org.springframework.security=INFO
logging.level.org.eduplay.eduplay=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
