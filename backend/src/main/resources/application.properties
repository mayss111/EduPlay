spring.application.name=EduPlay
# Server
server.port=${SERVER_PORT:8081}

# MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/eduplay_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true&connectTimeout=10000&socketTimeout=60000}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:eduplay}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:StrongPassword123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.cache.redis.time-to-live=86400000

# JWT
app.jwt.secret=${APP_JWT_SECRET:EduPlayLocalJwtSecretKey_ChangeMe_2026}
app.jwt.expiration=86400000

# Ollama API (local) - BALANCED temperature for speed vs quality
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:qwen2.5:7b-instruct}
ollama.temperature=${OLLAMA_TEMPERATURE:0.25}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
