# Development profile - use in-memory H2 to avoid MySQL auth issues
# Start the app with this profile to run without a local MySQL setup:
#  mvnw spring-boot:run -Dspring-boot.run.profiles=dev
# or
#  java -jar -Dspring.profiles.active=dev target\EduPlay-0.0.1-SNAPSHOT.jar

spring.application.name=EduPlay-dev
server.port=${SERVER_PORT:8082}

# H2 (in-memory) datasource for quick local dev/test
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/eduplay_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true&connectTimeout=10000&socketTimeout=60000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# H2 console removed: MySQL is used for dev as well

# Redis (leave as-is if you run Redis locally)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.cache.redis.time-to-live=86400000

# JWT (keep production secret elsewhere)
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration=86400000

# Ollama API (local)
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.1}

# CORS
app.cors.allowed-origins=http://localhost:4200

