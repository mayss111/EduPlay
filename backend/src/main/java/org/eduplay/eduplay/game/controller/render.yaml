services:
  # Le service Backend (Spring Boot)
  - type: web
    name: eduplay-backend
    env: java
    buildCommand: cd backend && ./mvnw clean install -DskipTests
    startCommand: cd backend && java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: eduplay-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: eduplay-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: eduplay-db
          property: password
      - key: APP_JWT_SECRET
        generateValue: true

  # Le service Frontend (React)
  - type: web
    name: eduplay-frontend
    env: static
    buildCommand: cd frontend/eduplay-frontend && npm install && npm run build
    staticPublishPath: frontend/eduplay-frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromStack:
          type: web
          name: eduplay-backend
          property: url

databases:
  - name: eduplay-db
    databaseName: eduplay_db
    user: eduplay
    plan: free # Note: MySQL n'est pas dispo en gratuit sur Render, utilisez PostgreSQL si possible