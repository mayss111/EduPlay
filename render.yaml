databases:
  # 1. Base de données PostgreSQL
  - name: eduplay-db
    databaseName: eduplay
    user: eduplay
    plan: free

services:
  # 2. Backend Spring Boot
  - type: web
    name: eduplay-backend
    env: java
    region: frankfurt
    plan: free
    buildCommand: cd backend && chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar backend/target/eduplay-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: eduplay-db
          property: jdbcConnectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: eduplay-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: eduplay-db
          property: password
      - key: SERVER_PORT
        value: 10000
      - key: APP_JWT_SECRET
        generateValue: true
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: SPRING_CACHE_TYPE
        value: none
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://eduplay-frontend.onrender.com,https://eduplay-backend.onrender.com,http://localhost:4200"

  # 3. Frontend Angular (Utilisation du type 'web' avec 'env: static')
  - type: web
    name: eduplay-frontend
    env: static
    region: frankfurt
    plan: free
    buildCommand: cd frontend/eduplay-frontend && npm install && npm run build
    staticPublishPath: frontend/eduplay-frontend/dist/eduplay-frontend/browser
    routes:
      - type: rewrite
        source: /api/*
        destination: https://eduplay-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
