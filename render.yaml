databases:
  - name: eduplay-db
    databaseName: eduplay
    user: eduplay
    plan: free

services:
  - type: web
    name: eduplay-backend
    env: docker
    region: frankfurt
    plan: free
    dockerfilePath: Dockerfile

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eduplay-db
          property: connectionString

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: eduplay-db
          property: user

      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: eduplay-db
          property: password

      - key: APP_JWT_SECRET
        generateValue: true

      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

      - key: SPRING_CACHE_TYPE
        value: none

    healthCheckPath: /api/game/questions?subject=MATH&difficulty=SIMPLE&classLevel=1