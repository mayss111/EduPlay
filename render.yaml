services:
  # Backend Spring Boot
  - type: web
    name: eduplay-backend
    env: java
    region: frankfurt
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/eduplay-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: DATABASE_URL
        fromDatabase:
          name: eduplay-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: eduplay-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: eduplay-db
          property: password
      - key: APP_JWT_SECRET
        generateValue: true
      - key: SERVER_PORT
        value: 10000
      - key: OLLAMA_BASE_URL
        value: ""
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: SPRING_DATA_REDIS_HOST
        value: ""
      - key: SPRING_CACHE_TYPE
        value: none
      - key: APP_CORS_ALLOWED_ORIGINS
        value: "https://eduplay-frontend.vercel.app,https://eduplay.vercel.app,http://localhost:4200"
    disk:
      name: question-data
      mountPath: /data
      sizeGB: 1

databases:
  # PostgreSQL gratuit Render
  - name: eduplay-db
    databaseName: eduplay
    plan: free
    ipAllowList: []